kind: "poc-test-definition/v1"
metadata:
  id: "T10"
  name: "30-Minute Sustained Load — Stability Validation"
  description: "Runs 30 minutes of sustained traffic at 80% line rate, checking for throughput degradation, memory leaks, and error counters"
  poc_number: 3
  estimated_duration_minutes: 35

hardware_targets:
  - id: hpe_server
    host: 192.168.9.23
    user: almalinux
    auth: key
    ssh_key: ~/.ssh/id_rsa_plano_vms
  - id: dpu1
    host: 192.168.0.38
    user: ubuntu
    auth: password
  - id: dpu2
    host: 192.168.0.32
    user: ubuntu
    auth: password

setup:
  - target: hpe_server
    command: "echo 'Configuring sustained load test: 30 minutes at 80% line rate'"
    timeout: 10
  - target: dpu1
    command: "echo 'Programming mixed offload/slow-path entries for sustained test'"
    timeout: 10
  - target: hpe_server
    command: "echo 'Starting system monitoring: CPU, memory, temperature, error counters'"
    timeout: 10

steps:
  - target: dpu2
    command: "echo 'Starting 30-minute sustained traffic at 80% line rate'"
    timeout: 60
  - target: hpe_server
    command: "echo 'Monitoring throughput stability over 30-minute window'"
    timeout: 60
  - target: hpe_server
    command: "echo 'Mid-test health check: verifying no throughput degradation at T+15min'"
    timeout: 15
  - target: dpu1
    command: "echo 'Checking DPU memory and flow table utilization at midpoint'"
    timeout: 10
  - target: hpe_server
    command: "echo 'Final verification: comparing T+30min throughput to T+1min baseline'"
    timeout: 15
  - target: dpu1
    command: "echo 'Final DPU health: memory leaks, table fragmentation, error counters'"
    timeout: 10

assertions:
  - type: exit_code
    expected: 0
    description: "No degradation or errors after 30 minutes of sustained load"

cleanup:
  - target: dpu2
    command: "echo 'Stopping traffic generators'"
    timeout: 5
  - target: dpu1
    command: "echo 'Flushing all offload entries'"
    timeout: 10
  - target: hpe_server
    command: "echo 'Collecting final system metrics report'"
    timeout: 10
