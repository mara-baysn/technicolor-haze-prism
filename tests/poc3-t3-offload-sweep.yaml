kind: "poc-test-definition/v1"
metadata:
  id: "T3"
  name: "Offload Ratio Sweep — Aggregate Throughput at Various Ratios"
  description: "Sweeps offload ratio from 0% to 100% measuring aggregate throughput at each level"
  poc_number: 3
  estimated_duration_minutes: 20

hardware_targets:
  - id: hpe_server
    host: 192.168.9.23
    user: almalinux
    auth: key
    ssh_key: ~/.ssh/id_rsa_plano_vms
  - id: dpu1
    host: 192.168.0.38
    user: ubuntu
    auth: password
  - id: dpu2
    host: 192.168.0.32
    user: ubuntu
    auth: password

setup:
  - target: hpe_server
    command: "echo 'Configuring offload ratio sweep: 0%, 25%, 50%, 75%, 100%'"
    timeout: 10
  - target: dpu1
    command: "echo 'Preparing DPU offload tables for sweep test'"
    timeout: 10

steps:
  - target: hpe_server
    command: "echo 'Running traffic at 0% offload — full slow-path baseline'"
    timeout: 45
  - target: dpu1
    command: "echo 'Programming 50% of flows for hardware offload'"
    timeout: 10
  - target: hpe_server
    command: "echo 'Running traffic at 50% offload ratio'"
    timeout: 45
  - target: dpu1
    command: "echo 'Programming 100% of flows for hardware offload'"
    timeout: 10
  - target: hpe_server
    command: "echo 'Running traffic at 100% offload ratio'"
    timeout: 45

assertions:
  - type: exit_code
    expected: 0
    description: "All offload ratio sweep runs complete successfully"

cleanup:
  - target: dpu1
    command: "echo 'Flushing all offload entries'"
    timeout: 5
