kind: "poc-test-definition/v1"
metadata:
  id: "T4"
  name: "Connection Storm — 100K New Flows/sec Handling"
  description: "Tests system behavior under 100K new connections per second burst, monitoring for drops and table overflow"
  poc_number: 3
  estimated_duration_minutes: 15

hardware_targets:
  - id: hpe_server
    host: 192.168.9.23
    user: almalinux
    auth: key
    ssh_key: ~/.ssh/id_rsa_plano_vms
  - id: dpu1
    host: 192.168.0.38
    user: ubuntu
    auth: password
  - id: dpu2
    host: 192.168.0.32
    user: ubuntu
    auth: password

setup:
  - target: hpe_server
    command: "echo 'Configuring TRex for 100K new connections/sec burst'"
    timeout: 10
  - target: dpu1
    command: "echo 'Clearing connection tables and resetting counters'"
    timeout: 10

steps:
  - target: dpu2
    command: "echo 'Generating 100K new flows/sec connection storm for 30s'"
    timeout: 45
  - target: hpe_server
    command: "echo 'Monitoring VM CPU and memory during connection storm'"
    timeout: 45
  - target: dpu1
    command: "echo 'Verifying DPU flow table entries after storm'"
    timeout: 15
  - target: hpe_server
    command: "echo 'Checking for dropped connections during storm'"
    timeout: 10

assertions:
  - type: exit_code
    expected: 0
    description: "Connection storm completes without crashes or table overflow"

cleanup:
  - target: dpu1
    command: "echo 'Flushing storm flow entries'"
    timeout: 10
