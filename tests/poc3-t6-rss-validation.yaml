kind: "poc-test-definition/v1"
metadata:
  id: "T6"
  name: "RSS Validation — Per-Queue Distribution"
  description: "Validates RSS hash distribution across 8 queues with diverse 5-tuple traffic, targeting under 15% variance"
  poc_number: 3
  estimated_duration_minutes: 12

hardware_targets:
  - id: hpe_server
    host: 192.168.9.23
    user: almalinux
    auth: key
    ssh_key: ~/.ssh/id_rsa_plano_vms
  - id: dpu1
    host: 192.168.0.38
    user: ubuntu
    auth: password
  - id: dpu2
    host: 192.168.0.32
    user: ubuntu
    auth: password

setup:
  - target: hpe_server
    command: "echo 'Configuring 8 RSS queues on VF interfaces'"
    timeout: 10
  - target: hpe_server
    command: "echo 'Setting symmetric Toeplitz RSS hash key'"
    timeout: 10

steps:
  - target: dpu2
    command: "echo 'Generating diverse 5-tuple traffic to exercise RSS distribution'"
    timeout: 30
  - target: hpe_server
    command: "echo 'Collecting per-queue packet counters via ethtool -S'"
    timeout: 35
  - target: hpe_server
    command: "echo 'Analyzing queue distribution: expecting <15% variance across 8 queues'"
    timeout: 10

assertions:
  - type: exit_code
    expected: 0
    description: "RSS queue distribution variance is under 15%"

cleanup:
  - target: hpe_server
    command: "echo 'Resetting RSS configuration to defaults'"
    timeout: 5
