kind: "poc-test-definition/v1"
metadata:
  id: "T1"
  name: "DPDK Forwarding Baseline — Raw VF-to-VF Throughput"
  description: "Measures raw VF-to-VF DPDK forwarding throughput at 1500B frames using dpdk-testpmd and TRex"
  poc_number: 3
  estimated_duration_minutes: 15

hardware_targets:
  - id: hpe_server
    host: 192.168.9.23
    user: almalinux
    auth: key
    ssh_key: ~/.ssh/id_rsa_plano_vms
  - id: dpu1
    host: 192.168.0.38
    user: ubuntu
    auth: password
  - id: dpu2
    host: 192.168.0.32
    user: ubuntu
    auth: password

setup:
  - target: hpe_server
    command: "echo 'Configuring hugepages and vfio-pci for DPDK baseline test'"
    timeout: 10
  - target: hpe_server
    command: "echo 'Loading vfio-pci kernel module'"
    timeout: 10

steps:
  - target: hpe_server
    command: "echo 'Running dpdk-testpmd io-forwarding on 16 cores, 8 queues, burst=32'"
    timeout: 60
  - target: dpu2
    command: "echo 'Running TRex traffic generator at 100% rate for 30s with 1500B frames'"
    timeout: 45

assertions:
  - type: exit_code
    expected: 0
    description: "DPDK forwarding test completes without errors"

cleanup:
  - target: hpe_server
    command: "echo 'Stopping testpmd process'"
    timeout: 5
